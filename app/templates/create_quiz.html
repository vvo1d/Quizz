{% extends "base.html" %}

{% block title %}Создать квиз{% endblock %}

{% block content %}
  <h1>Создать квиз</h1>

  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post" class="form" onsubmit="reindexQuestionsBeforeSubmit()">
    <label for="title">Название</label>
    <input id="title" type="text" name="title" placeholder="Например: Основы Python" required>

    <label for="description">Описание</label>
    <textarea id="description" name="description" placeholder="Коротко о квизе"></textarea>

    <div id="questions" class="questions-list"></div>

    <div class="actions">
      <button type="button" class="button secondary" onclick="addQuestion()">Добавить вопрос</button>
      <button type="submit" class="button">Сохранить квиз</button>
    </div>
  </form>

  <script>
    const MIN_ANSWERS = 2;
    const MAX_ANSWERS = 10;
    let questionIndex = 0;
    let draggedQuestion = null;

    function addQuestion() {
      const questionsContainer = document.getElementById('questions');
      const index = questionIndex++;
      const block = document.createElement('div');

      block.className = 'question-block question-card';
      block.dataset.questionIndex = index;
      block.draggable = true;

      block.addEventListener('dragstart', handleDragStart);
      block.addEventListener('dragover', handleDragOver);
      block.addEventListener('drop', handleDrop);
      block.addEventListener('dragend', handleDragEnd);

      block.innerHTML = `
        <div class="question-header">
          <div class="drag-handle" title="Перетащить вопрос">☰</div>
          <h3 class="question-title">Вопрос ${index + 1}</h3>
          <button type="button" class="button danger small" onclick="removeQuestion(this)">Удалить вопрос</button>
        </div>

        <label>Текст вопроса</label>
        <input type="text" name="question_text" required>

        <label>Тип вопроса</label>
        <select name="question_type_${index}" onchange="syncCorrectInputs(${index})">
          <option value="single">Один правильный ответ</option>
          <option value="multiple">Несколько правильных ответов</option>
        </select>

        <div class="answers" id="answers_${index}"></div>

        <div class="actions compact">
          <button type="button" class="button secondary small" onclick="addAnswer(${index})">Добавить ответ</button>
        </div>
      `;

      questionsContainer.appendChild(block);
      addAnswer(index);
      addAnswer(index);
      updateQuestionTitles();
    }

    function removeQuestion(button) {
      button.closest('.question-block').remove();
      updateQuestionTitles();
    }

    function handleDragStart(event) {
      draggedQuestion = this;
      this.classList.add('dragging');
      event.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(event) {
      event.preventDefault();
      const target = event.currentTarget;

      if (!draggedQuestion || target === draggedQuestion) {
        return;
      }

      const container = document.getElementById('questions');
      const targetRect = target.getBoundingClientRect();
      const targetMiddle = targetRect.top + targetRect.height / 2;

      if (event.clientY < targetMiddle) {
        container.insertBefore(draggedQuestion, target);
      } else {
        container.insertBefore(draggedQuestion, target.nextSibling);
      }
    }

    function handleDrop(event) {
      event.preventDefault();
      updateQuestionTitles();
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
      draggedQuestion = null;
      updateQuestionTitles();
    }

    function addAnswer(questionIndex) {
      const answersContainer = document.getElementById(`answers_${questionIndex}`);
      const currentCount = answersContainer.children.length;

      if (currentCount >= MAX_ANSWERS) {
        alert(`Максимум ${MAX_ANSWERS} вариантов ответа.`);
        return;
      }

      const answerIndex = currentCount;
      const row = document.createElement('div');
      row.className = 'answer-row';
      row.innerHTML = buildAnswerInput(questionIndex, answerIndex, answerIndex === 0);
      answersContainer.appendChild(row);
      syncAnswerControls(questionIndex);
    }

    function removeAnswer(button, questionIndex) {
      const answersContainer = document.getElementById(`answers_${questionIndex}`);

      if (answersContainer.children.length <= MIN_ANSWERS) {
        alert(`Минимум ${MIN_ANSWERS} варианта ответа.`);
        return;
      }

      button.closest('.answer-row').remove();
      reindexAnswers(questionIndex);
      syncAnswerControls(questionIndex);
    }

    function buildAnswerInput(questionIndex, answerIndex, checked = false) {
      const questionType = document.querySelector(`[name="question_type_${questionIndex}"]`)?.value || 'single';
      const inputType = questionType === 'multiple' ? 'checkbox' : 'radio';

      return `
        <input
          type="${inputType}"
          name="correct_answers_${questionIndex}"
          value="${answerIndex}"
          ${checked ? 'checked' : ''}
        >
        <input
          type="text"
          name="answer_text_${questionIndex}"
          placeholder="Ответ ${answerIndex + 1}"
          required
        >
        <button
          type="button"
          class="button danger small"
          onclick="removeAnswer(this, ${questionIndex})"
        >
          Удалить
        </button>
      `;
    }

    function syncCorrectInputs(questionIndex) {
      const answersContainer = document.getElementById(`answers_${questionIndex}`);
      const rows = Array.from(answersContainer.children);
      const questionType = document.querySelector(`[name="question_type_${questionIndex}"]`).value;
      const inputType = questionType === 'multiple' ? 'checkbox' : 'radio';

      rows.forEach((row, answerIndex) => {
        const oldInput = row.querySelector('input[type="radio"], input[type="checkbox"]');
        const newInput = document.createElement('input');

        newInput.type = inputType;
        newInput.name = `correct_answers_${questionIndex}`;
        newInput.value = answerIndex;
        newInput.checked = oldInput.checked;

        oldInput.replaceWith(newInput);
      });

      if (questionType === 'single') {
        const checkedInputs = answersContainer.querySelectorAll('input[type="radio"]:checked');
        if (checkedInputs.length > 1) {
          checkedInputs.forEach((input, index) => input.checked = index === 0);
        }
      }
    }

    function reindexAnswers(questionIndex) {
      const answersContainer = document.getElementById(`answers_${questionIndex}`);
      const rows = Array.from(answersContainer.children);

      rows.forEach((row, answerIndex) => {
        const correctInput = row.querySelector('input[type="radio"], input[type="checkbox"]');
        const textInput = row.querySelector('input[type="text"]');

        correctInput.value = answerIndex;
        textInput.placeholder = `Ответ ${answerIndex + 1}`;
      });
    }

    function syncAnswerControls(questionIndex) {
      const answersContainer = document.getElementById(`answers_${questionIndex}`);
      const removeButtons = answersContainer.querySelectorAll('button');
      const disableRemove = answersContainer.children.length <= MIN_ANSWERS;

      removeButtons.forEach(button => button.disabled = disableRemove);
    }

    function updateQuestionTitles() {
      const cards = document.querySelectorAll('.question-card');
      cards.forEach((card, index) => {
        card.querySelector('.question-title').textContent = `Вопрос ${index + 1}`;
      });
    }

    function reindexQuestionsBeforeSubmit() {
      const cards = document.querySelectorAll('.question-card');

      cards.forEach((card, newQuestionIndex) => {
        const oldQuestionIndex = card.dataset.questionIndex;
        const typeSelect = card.querySelector(`select[name="question_type_${oldQuestionIndex}"]`);
        const answersContainer = card.querySelector(`#answers_${oldQuestionIndex}`);
        const addAnswerButton = card.querySelector('.actions.compact button');

        card.dataset.questionIndex = newQuestionIndex;

        typeSelect.name = `question_type_${newQuestionIndex}`;
        typeSelect.setAttribute('onchange', `syncCorrectInputs(${newQuestionIndex})`);

        answersContainer.id = `answers_${newQuestionIndex}`;
        addAnswerButton.setAttribute('onclick', `addAnswer(${newQuestionIndex})`);

        const rows = Array.from(answersContainer.children);
        rows.forEach((row, answerIndex) => {
          const correctInput = row.querySelector('input[type="radio"], input[type="checkbox"]');
          const textInput = row.querySelector('input[type="text"]');
          const removeButton = row.querySelector('button');

          correctInput.name = `correct_answers_${newQuestionIndex}`;
          correctInput.value = answerIndex;

          textInput.name = `answer_text_${newQuestionIndex}`;
          textInput.placeholder = `Ответ ${answerIndex + 1}`;

          removeButton.setAttribute('onclick', `removeAnswer(this, ${newQuestionIndex})`);
        });
      });
    }

    addQuestion();
  </script>
{% endblock %}
